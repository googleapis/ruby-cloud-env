name: CI

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  CI:
    if: ${{ github.repository == 'googleapis/ruby-cloud-env' }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            ruby: "3.2"
            task: test
          - os: ubuntu-latest
            ruby: "3.3"
            task: test
          - os: ubuntu-latest
            ruby: "3.4"
            task: test
          - os: ubuntu-latest
            ruby: "4.0"
            task: test
          - os: macos-latest
            ruby: "4.0"
            task: test
          - os: windows-latest
            ruby: "4.0"
            task: test
          - os: ubuntu-latest
            ruby: "4.0"
            task: rubocop , build , yardoc , linkinator
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout repo
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - name: Install Ruby ${{ matrix.ruby }}
      uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0
      with:
        ruby-version: "${{ matrix.ruby }}"
    - name: Install NodeJS 24.x
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: "24.x"
    - name: Install tools
      shell: bash
      run: "gem install --no-document toys"
    - name: Test ${{ matrix.task }}
      shell: bash
      run: |
        for task in $(echo "${{ matrix.task }}" | tr ',' ' '); do
          toys "$task" < /dev/null
        done
