name: CI
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  CI:
    if: ${{ github.repository == 'googleapis/ruby-cloud-env' }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            ruby: "3.2"
            task: test
          - os: ubuntu-latest
            ruby: "3.3"
            task: test
          - os: ubuntu-latest
            ruby: "3.4"
            task: test
          - os: ubuntu-latest
            ruby: "4.0"
            task: test
          - os: macos-latest
            ruby: "4.0"
            task: test
          - os: windows-latest
            ruby: "4.0"
            task: test
          - os: ubuntu-latest
            ruby: "4.0"
            task: rubocop , build , yardoc , linkinator
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout repo
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
    - name: Install Ruby ${{ matrix.ruby }}
      uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1
      with:
        ruby-version: "${{ matrix.ruby }}"
    - name: Install NodeJS 24.x
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: "24.x"
    - name: Install tools
      shell: bash
      run: "gem install --no-document toys"
    - name: Test ${{ matrix.task }}
      shell: bash
      run: |
        for task in $(echo "${{ matrix.task }}" | tr ',' ' '); do
          toys "$task" < /dev/null
        done
